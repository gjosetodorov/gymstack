services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gymstack_members_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    image: ${DOCKERHUB_USERNAME}/gymstack-backend:${IMAGE_TAG}
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-gymstack_members_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      - db
    ports:
      - "9999:9999"
    volumes:
      - ./uploads:/app/uploads

  frontend:
    image: ${DOCKERHUB_USERNAME}/gymstack-frontend:${IMAGE_TAG}
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db_data:
