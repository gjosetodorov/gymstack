services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: gymstack_members_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/gymstack_members_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      - db
    ports:
      - "9999:9999"
    volumes:
      - ./uploads:/app/uploads

  frontend:
    build:
      context: ./src/main/frontend
      args:
        REACT_APP_API_BASE_URL: http://localhost:9999
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  db_data:
